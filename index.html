<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新MBTI診断</title>
<style>

</style>
</head>

<div class="container">

        </div>
    </div>
</div>
